version: '0.1'

networks:
  test:

services:
  client:
    image: client
    build:
      context: client
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: production
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./client:/home/node/app
    working_dir: /home/node/app
    ports:
      - 3000:3000
    depends_on: 
      - server
    networks:
      - test

  server:
    image: server
    build:
      context: server
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: production
    ports:
      - 3001:3001
    networks:
      - test

